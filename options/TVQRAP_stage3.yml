# general settings
name: TVQRAP_stage3
model_type: TVQRAP_stage3_Model
num_gpu: 2
manual_seed: 0


# the first degradation process
resize_prob: [0.2, 0.7, 0.1]  # up, down, keep
resize_range: [0.15, 1.5]
gaussian_noise_prob: 0.5
noise_range: [1, 30]
poisson_scale_range: [0.05, 3]
gray_noise_prob: 0.4
jpeg_range: [30, 95]

# the second degradation process
second_order_prob: 0.5
second_blur_prob: 0.8
resize_prob2: [0.3, 0.4, 0.3]  # up, down, keep
resize_range2: [0.3, 1.2]
gaussian_noise_prob2: 0.5
noise_range2: [1, 25]
poisson_scale_range2: [0.05, 2.5]
gray_noise_prob2: 0.4
jpeg_range2: [30, 95]


scale: 4
queue_size: 184
# dataset and data loader settings
datasets:
  train:
    name: imagnet
    type: Imagenet_stage2_Dataset
    dataroot_gt: .../.../.../imagenet_train_dir
    
    filename_tmpl: '{}'
    io_backend:
      type: disk

    blur_kernel_size: 21
    kernel_list: ['iso', 'aniso', 'generalized_iso', 'generalized_aniso', 'plateau_iso', 'plateau_aniso']
    kernel_prob: [0.45, 0.25, 0.12, 0.03, 0.12, 0.03]
    sinc_prob: 0.1
    blur_sigma: [0.2, 3]
    betag_range: [0.5, 4]
    betap_range: [1, 2]

    blur_kernel_size2: 15
    kernel_list2: ['iso', 'aniso', 'generalized_iso', 'generalized_aniso', 'plateau_iso', 'plateau_aniso']
    kernel_prob2: [0.45, 0.25, 0.12, 0.03, 0.12, 0.03]
    sinc_prob2: 0.1
    blur_sigma2: [0.2, 1.5]
    betag_range2: [0.5, 4.0]
    betap_range2: [1, 2.0]

    final_sinc_prob: 0.8

    gt_size: 512
    use_hflip: True
    use_rot: False
   
    # data loader
    num_worker_per_gpu: 2
    batch_size_per_gpu: 2
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: validation
    type: Imagenet_test_Dataset
    dataroot_gt: .../.../.../imagenet256-test/gt_dir
    dataroot_lq: .../.../.../imagenet256-test/lq_dir
    io_backend:
      type: disk


# network structures
network_g:
  type: CodeFormer
  dim_embd: 256
  codebook_size: 1024
  fix_modules: ['quantize','generator']

network_d:
  type: VQGANDiscriminator
  input_nc: 3
  n_layers: 2
  ndf: 64

# path
path:
  pretrain_network_g: './trained_weights/tvqrap_sr_stage2_model.pth' # put the trained SR model weights (trained in stage2) here
  param_key_g: params_ema
  strict_load_g: false
  pretrain_network_d: ~ 
  resume_state: ~

train:
  use_hq_feat_loss: true
  feat_loss_weight: 1.0
  cross_entropy_loss: true
  entropy_loss_weight: 0.5
  scale_adaptive_gan_weight: 0.75

  optim_g:
    type: Adam
    lr: 4.0e-5
    weight_decay: 0
    betas: [0.9, 0.99]
  optim_d:
    type: Adam
    lr: 4.0e-5
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [60000000000]
    gamma: 1


  total_iter: 4000

  warmup_iter: -1  # no warm up
  ema_decay: 0.997

  pixel_opt:
    type: MSELoss
    loss_weight: 1.0
    reduction: mean

  perceptual_opt:
    type: LPIPSLoss
    loss_weight: 1.0
    use_input_norm: true
    range_norm: true

  gan_opt:
    type: GANLoss
    gan_type: hinge
    loss_weight: !!float 1.0 # adaptive_weighting

  use_adaptive_weight: true

  net_g_start_iter: 0
  net_d_iters: 1
  net_d_start_iter: 0
  manual_seed: 0

# validation settings
val:
  val_freq: 2000 # no validation
  save_img: true

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: 2000
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29413

find_unused_parameters: true
